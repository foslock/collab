<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collab Canvas</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <!-- Top bar -->
  <div id="topbar">
    <div id="identity">
      <span id="color-dot"></span>
      <span id="user-name">Connecting…</span>
    </div>
    <div id="active-users"></div>
    <div id="controls">
      <button id="btn-delete" title="Delete my drawings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
          <line x1="10" y1="11" x2="10" y2="17"/>
          <line x1="14" y1="11" x2="14" y2="17"/>
        </svg>
      </button>
      <button id="btn-zoom-in" title="Zoom in">+</button>
      <button id="btn-zoom-out" title="Zoom out">−</button>
      <button id="btn-reset" title="Reset view">⊙</button>
    </div>
  </div>

  <!-- Canvas -->
  <canvas id="canvas"></canvas>

  <!-- Cursor labels (rendered as DOM elements on top of canvas) -->
  <div id="cursor-layer"></div>

  <script src="/static/app.js"></script>
</body>
</html>
